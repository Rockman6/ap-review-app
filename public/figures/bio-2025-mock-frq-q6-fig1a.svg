<svg xmlns="http://www.w3.org/2000/svg" viewBox="-110 0 780 420" font-family="Georgia, 'Times New Roman', serif" font-size="13">
  <style>
    .bar  { fill:#c6c6c6; stroke:#111; stroke-width:1; }
    .axis { stroke:#111; stroke-width:1.2; fill:none; }
    .tick { stroke:#111; stroke-width:1; }
    .err  { stroke:#111; stroke-width:1.4; fill:none; }
    .lbl  { fill:#111; }
  </style>

  <!-- plot area: x 120..660, y 40..320 ; y 0..100 over 280px ; y(v)=320 - v*2.8 -->
  <line class="axis" x1="120" y1="40"  x2="120" y2="320"/>
  <line class="axis" x1="120" y1="320" x2="660" y2="320"/>

  <!-- y ticks 0,20,40,60,80,100 -->
  <g>
    <line class="tick" x1="115" y1="320" x2="120" y2="320"/><text x="110" y="324" text-anchor="end">0</text>
    <line class="tick" x1="115" y1="264" x2="120" y2="264"/><text x="110" y="268" text-anchor="end">20</text>
    <line class="tick" x1="115" y1="208" x2="120" y2="208"/><text x="110" y="212" text-anchor="end">40</text>
    <line class="tick" x1="115" y1="152" x2="120" y2="152"/><text x="110" y="156" text-anchor="end">60</text>
    <line class="tick" x1="115" y1="96"  x2="120" y2="96" /><text x="110" y="100" text-anchor="end">80</text>
    <line class="tick" x1="115" y1="40"  x2="120" y2="40" /><text x="110" y="44"  text-anchor="end">100</text>
  </g>

  <!-- y-title -->
  <g class="lbl" text-anchor="middle">
    <text x="-10" y="140">Percent of</text>
    <text x="-10" y="158">Metaphase Cells with</text>
    <text x="-10" y="176">ALD-Associated</text>
    <text x="-10" y="194">Filaments</text>
  </g>

  <!-- Bar centers at 200, 300, 400, 500, 600 -->
  <!-- WT/WT: 63, err 20 -->
  <rect class="bar" x="180" y="144" width="40" height="176"/>
  <line class="err" x1="200" y1="88"  x2="200" y2="200"/>
  <line class="err" x1="193" y1="88"  x2="207" y2="88" />
  <line class="err" x1="193" y1="200" x2="207" y2="200"/>
  <!-- WT/del: 78, err 12 -->
  <rect class="bar" x="280" y="102" width="40" height="218"/>
  <line class="err" x1="300" y1="69"  x2="300" y2="136"/>
  <line class="err" x1="293" y1="69"  x2="307" y2="69" />
  <line class="err" x1="293" y1="136" x2="307" y2="136"/>
  <!-- ald1/del: 12, err 6 -->
  <rect class="bar" x="380" y="286" width="40" height="34"/>
  <line class="err" x1="400" y1="269" x2="400" y2="303"/>
  <line class="err" x1="393" y1="269" x2="407" y2="269"/>
  <line class="err" x1="393" y1="303" x2="407" y2="303"/>
  <!-- ald3/ald23: 5, err 3 -->
  <rect class="bar" x="480" y="306" width="40" height="14"/>
  <line class="err" x1="500" y1="297" x2="500" y2="315"/>
  <line class="err" x1="493" y1="297" x2="507" y2="297"/>
  <line class="err" x1="493" y1="315" x2="507" y2="315"/>
  <!-- ald23/del: ~3, err 2 -->
  <rect class="bar" x="580" y="312" width="40" height="8"/>
  <line class="err" x1="600" y1="307" x2="600" y2="317"/>
  <line class="err" x1="593" y1="307" x2="607" y2="307"/>
  <line class="err" x1="593" y1="317" x2="607" y2="317"/>

  <!-- x-axis labels -->
  <g class="lbl" text-anchor="middle" font-size="13">
    <text x="200" y="340" font-style="italic">WT/WT</text>
    <text x="300" y="340" font-style="italic">WT/del</text>
    <text x="400" y="340" font-style="italic">ald1/del</text>
    <text x="500" y="340" font-style="italic">ald3/ald23</text>
    <text x="600" y="340" font-style="italic">ald23/del</text>
    <text x="390" y="378"><tspan font-style="italic">ald</tspan> Genotype</text>
  </g>
</svg>
