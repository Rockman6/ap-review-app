<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="Georgia, 'Times New Roman', serif" font-size="14">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#111"/>
    </marker>
  </defs>
  <style>
    .ln   { stroke: #111; fill: none; stroke-width: 1.5; }
    .thin { stroke: #111; fill: none; stroke-width: 1; }
    .dash { stroke: #111; fill: none; stroke-width: 1.2; stroke-dasharray: 6 5; }
    .lbl  { fill: #111; }
    .shape{ fill: #fff; stroke: #111; stroke-width: 1.4; }
  </style>

  <!-- Membrane bilayer: two gentle curves -->
  <path class="ln" d="M40 150 C 220 120, 540 120, 720 150"/>
  <path class="ln" d="M40 185 C 220 155, 540 155, 720 185"/>

  <!-- Plasma Membrane label (right side) with a leader that ends ON the membrane only, not through text -->
  <g class="lbl" text-anchor="start">
    <text x="580" y="105">Plasma</text>
    <text x="580" y="124">Membrane</text>
  </g>
  <path class="thin" d="M620 128 L 660 150"/>

  <!-- ================= LEFT: inactive complex ================= -->
  <!-- 20E ligand: small open circle sitting above the receptor notch -->
  <circle cx="210" cy="115" r="7" class="shape"/>
  <!-- 20E label + leader line (horizontal to the left) -->
  <text x="138" y="120" class="lbl">20E</text>
  <line class="thin" x1="170" y1="116" x2="202" y2="116"/>

  <!-- Left DopEcR receptor: rectangular body crossing bilayer with U-shaped binding pocket on top -->
  <!-- Body outline path: starts top-left of pocket, draws pocket, then outer rectangle -->
  <path class="shape"
        d="M188 140 L188 125 L204 125 L204 138 L216 138 L216 125 L232 125 L232 215 L188 215 Z"/>

  <!-- DopEcR label placed ABOVE membrane, to the right of the receptor. Leader ends at receptor top-right corner, NOT crossing any text. -->
  <text x="255" y="118" class="lbl">DopEcR</text>
  <path class="thin" d="M252 122 L 236 135"/>

  <!-- GDP + Gα complex under left receptor -->
  <!-- GDP pill -->
  <rect x="178" y="232" width="44" height="22" rx="11" class="shape"/>
  <text x="200" y="247" class="lbl" text-anchor="middle" font-size="12">GDP</text>
  <!-- Gα pill (slightly smaller, touching GDP) -->
  <rect x="222" y="232" width="32" height="22" rx="4" class="shape"/>
  <text x="238" y="247" class="lbl" text-anchor="middle" font-size="12">Gα</text>

  <!-- Label "G-Protein (Inactive)" beneath -->
  <g class="lbl" text-anchor="middle">
    <text x="210" y="290">G-Protein</text>
    <text x="210" y="308">(Inactive)</text>
  </g>
  <path class="thin" d="M210 268 L 210 275"/>

  <!-- ================= RIGHT: active complex ================= -->
  <!-- Right DopEcR: same receptor but NO ligand bound -->
  <path class="shape"
        d="M468 140 L468 125 L484 125 L484 138 L496 138 L496 125 L512 125 L512 215 L468 215 Z"/>

  <!-- GTP circle -->
  <circle cx="430" cy="270" r="17" class="shape"/>
  <text x="430" y="274" class="lbl" text-anchor="middle" font-size="12">GTP</text>

  <!-- Gα pentagon/arrow shape: pointing right -->
  <path class="shape" d="M450 255 L494 255 L508 270 L494 285 L450 285 L458 270 Z"/>
  <text x="478" y="274" class="lbl" text-anchor="middle" font-size="12">Gα</text>

  <!-- Activation arrow from base of right receptor down+right to the Gα pentagon -->
  <path class="thin" d="M490 218 C 490 235, 478 248, 472 256" marker-end="url(#arr)"/>

  <!-- "G-Protein (Active)" label to the right of the complex -->
  <text x="525" y="265" class="lbl">G-Protein</text>
  <text x="525" y="283" class="lbl">(Active)</text>
  <path class="thin" d="M520 270 L 510 270"/>

  <!-- Dashed arrow from the Gα complex straight down to the gene-expression caption -->
  <path class="dash" d="M470 290 L 470 370 L 400 395" marker-end="url(#arr)"/>

  <!-- Bottom caption (bold, centered) -->
  <g text-anchor="middle" font-weight="bold" class="lbl">
    <text x="380" y="430">Increased Expression of Genes</text>
    <text x="380" y="452">Associated with Oriented Activity</text>
    <text x="380" y="474">in Male Moths</text>
  </g>
</svg>
