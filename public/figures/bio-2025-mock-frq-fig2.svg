<svg xmlns="http://www.w3.org/2000/svg" viewBox="-80 0 820 480" font-family="Georgia, 'Times New Roman', serif" font-size="13">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#222" stroke-width="1.2"/>
    </pattern>
  </defs>
  <style>
    .bar-light { fill: #c6c6c6; stroke: #111; stroke-width: 1; }
    .bar-dark  { fill: #222;    stroke: #111; stroke-width: 1; }
    .bar-hatch { fill: url(#hatch); stroke: #111; stroke-width: 1; }
    .axis { stroke: #111; stroke-width: 1.2; fill: none; }
    .tick { stroke: #111; stroke-width: 1; }
    .err  { stroke: #111; stroke-width: 1.4; fill: none; }
    .lbl  { fill: #111; }
  </style>

  <!-- Plot: x 120..700, y 60..340; y-scale: 0..125 over 280 px → 1 unit = 2.24 px; y(v) = 340 - v*2.24 -->
  <line class="axis" x1="120" y1="60"  x2="120" y2="340"/>
  <line class="axis" x1="120" y1="340" x2="700" y2="340"/>

  <!-- Y-axis ticks at 0,25,50,75,100,125 -->
  <g>
    <line class="tick" x1="115" y1="340" x2="120" y2="340"/><text x="110" y="344" text-anchor="end">0</text>
    <line class="tick" x1="115" y1="284" x2="120" y2="284"/><text x="110" y="288" text-anchor="end">25</text>
    <line class="tick" x1="115" y1="228" x2="120" y2="228"/><text x="110" y="232" text-anchor="end">50</text>
    <line class="tick" x1="115" y1="172" x2="120" y2="172"/><text x="110" y="176" text-anchor="end">75</text>
    <line class="tick" x1="115" y1="116" x2="120" y2="116"/><text x="110" y="120" text-anchor="end">100</text>
    <line class="tick" x1="115" y1="60"  x2="120" y2="60" /><text x="110" y="64"  text-anchor="end">125</text>
  </g>

  <!-- Y-axis title -->
  <g class="lbl">
    <text x="30" y="160" text-anchor="middle">Relative</text>
    <text x="30" y="178" text-anchor="middle">Amount</text>
    <text x="30" y="196" text-anchor="middle">of Protein</text>
    <text x="30" y="214" text-anchor="middle">Transported</text>
    <text x="30" y="232" text-anchor="middle">to the ER</text>
    <text x="30" y="250" text-anchor="middle">(% of control)</text>
  </g>

  <!-- Group headers above each triple -->
  <g class="lbl" text-anchor="middle" font-weight="bold">
    <text x="220" y="48">Protein 1</text>
    <text x="410" y="48">Protein 2</text>
    <text x="600" y="48">Protein 3</text>
  </g>

  <!-- GROUP 1: Protein 1 (light-gray bars). Bars centered at x=180,220,260. Bar width=36 -->
  <!-- Control = 100 (y=116), Sec62 = 45 (y=239.2), SR = 80 (y=160.8) -->
  <rect class="bar-light" x="162" y="116" width="36" height="224"/>
  <rect class="bar-light" x="202" y="239" width="36" height="101"/>
  <rect class="bar-light" x="242" y="161" width="36" height="179"/>
  <!-- Error bars Protein 1 -->
  <!-- Control ±2 -->
  <line class="err" x1="180" y1="112" x2="180" y2="121"/><line class="err" x1="175" y1="112" x2="185" y2="112"/><line class="err" x1="175" y1="121" x2="185" y2="121"/>
  <!-- Sec62 ±8 -->
  <line class="err" x1="220" y1="221" x2="220" y2="257"/><line class="err" x1="215" y1="221" x2="225" y2="221"/><line class="err" x1="215" y1="257" x2="225" y2="257"/>
  <!-- SR ±7 -->
  <line class="err" x1="260" y1="145" x2="260" y2="177"/><line class="err" x1="255" y1="145" x2="265" y2="145"/><line class="err" x1="255" y1="177" x2="265" y2="177"/>

  <!-- GROUP 2: Protein 2 (dark bars). Bars at x=370,410,450 -->
  <!-- Control = 100 (y=116), Sec62 = 115 (y=82.4), SR = 48 (y=232.5) -->
  <rect class="bar-dark" x="352" y="116" width="36" height="224"/>
  <rect class="bar-dark" x="392" y="82"  width="36" height="258"/>
  <rect class="bar-dark" x="432" y="232" width="36" height="108"/>
  <line class="err" x1="370" y1="112" x2="370" y2="121"/><line class="err" x1="365" y1="112" x2="375" y2="112"/><line class="err" x1="365" y1="121" x2="375" y2="121"/>
  <line class="err" x1="410" y1="73"  x2="410" y2="92" /><line class="err" x1="405" y1="73"  x2="415" y2="73" /><line class="err" x1="405" y1="92"  x2="415" y2="92" />
  <line class="err" x1="450" y1="215" x2="450" y2="250"/><line class="err" x1="445" y1="215" x2="455" y2="215"/><line class="err" x1="445" y1="250" x2="455" y2="250"/>

  <!-- GROUP 3: Protein 3 (diagonal hatch). Bars at x=560,600,640 -->
  <!-- Control = 100 (y=116), Sec62 = 112 (y=89.1), SR = 8 (y=322.1) -->
  <rect class="bar-hatch" x="542" y="116" width="36" height="224"/>
  <rect class="bar-hatch" x="582" y="89"  width="36" height="251"/>
  <rect class="bar-hatch" x="622" y="322" width="36" height="18"/>
  <line class="err" x1="560" y1="112" x2="560" y2="121"/><line class="err" x1="555" y1="112" x2="565" y2="112"/><line class="err" x1="555" y1="121" x2="565" y2="121"/>
  <line class="err" x1="600" y1="80"  x2="600" y2="98" /><line class="err" x1="595" y1="80"  x2="605" y2="80" /><line class="err" x1="595" y1="98"  x2="605" y2="98" />
  <line class="err" x1="640" y1="313" x2="640" y2="331"/><line class="err" x1="635" y1="313" x2="645" y2="313"/><line class="err" x1="635" y1="331" x2="645" y2="331"/>

  <!-- Bar labels -->
  <g class="lbl" text-anchor="middle" font-size="12">
    <text x="180" y="360">Control</text>
    <text x="220" y="360">Sec62</text>
    <text x="260" y="360">SR</text>

    <text x="370" y="360">Control</text>
    <text x="410" y="360">Sec62</text>
    <text x="450" y="360">SR</text>

    <text x="560" y="360">Control</text>
    <text x="600" y="360">Sec62</text>
    <text x="640" y="360">SR</text>
  </g>

  <!-- X-axis title -->
  <text x="410" y="390" text-anchor="middle" class="lbl">siRNA Added to Cells</text>
</svg>
